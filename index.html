<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя музыка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Моя музыкальная коллекция</h1>
        <div id="album-grid"></div>
        
        <div id="player" style="display: none;">

            <img id="album-cover" src="" alt="Обложка">

            <ul id="track-list"></ul>
            <button id="back-btn">← Назад к альбомам</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
