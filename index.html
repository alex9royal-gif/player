<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Блок авторизации -->
        <div id="auth-section">
            <p>Введите ключ:</p>
            <input type="password" id="token-input" placeholder="Вставьте токен сюда">
            <button id="auth-btn">Войти</button>
            <div id="auth-error" style="color: red; margin-top: 10px;"></div>
        </div>

        <!-- Основной контент -->
        <div id="content" style="display: none;">
            <div id="album-grid"></div>
            
            <div id="player" style="display: none;">
                <h2 id="album-title"></h2>
                <img id="album-cover" src="placeholder.jpg" alt="Обложка" style="width:500px;height:500px;object-fit:cover;border-radius:10px;margin:15px auto;display:block;">
                <audio id="audio-player" controls></audio>
                <ul id="track-list"></ul>
                <button id="back-btn">← Назад к альбомам</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
